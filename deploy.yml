--- 
- name: Deploy Maven Artifact (Jenkins User Accessible) 
  hosts: localhost 
 
 
  tasks: 
   - name: Ensure deployment directory exists 
     ansible.builtin.file: 
      path: /tmp/deployment 
      state: directory 
      mode: '0755' 

   - name: Copy the artifact to the deployment directory 
     ansible.builtin.copy: 
      src: /mnt/c/Users/hp/.jenkins/workspace/HelloMaven-CI-A2/target/HelloMavenA2-1.0SNAPSHOT.jar 
      dest: /tmp/deployment/HelloMaven.jar 
      remote_src: yes